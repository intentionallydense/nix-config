# sops-nix configuration.
# Secrets are encrypted with an age key derived from the SSH ed25519 key.
#
# Setup:
#   1. Derive your age public key:
#      ssh-to-age < ~/.ssh/id_ed25519.pub
#   2. Replace the placeholder below with the output.
#   3. Create the age private key for decryption:
#      mkdir -p ~/.config/sops/age
#      ssh-to-age -private-key -i ~/.ssh/id_ed25519 > ~/.config/sops/age/keys.txt
#      macOS: sops reads ~/Library/Application Support/sops/age/keys.txt instead,
#      or skip keys.txt: set -Ux SOPS_AGE_SSH_PRIVATE_KEY_FILE ~/.ssh/id_ed25519
#      Host without a user key (tin): root can decrypt via the host key —
#      export SOPS_AGE_KEY=$(ssh-to-age -private-key -i /etc/ssh/ssh_host_ed25519_key)
#   4. Create a secret file:
#      sops secrets/secrets.yaml
keys:
  - &fluoride_carbon age17chsklmd20tfpmc9enx3hws4eed0tkcjy4fq5mcq8w9ggd8kh9lsz254m9
  - &bromide_germanium age15zk95vyfa7wrgqvx6egxc88a66f7tk5m86u864k9le9wgrhxu9ds825x6u
  # tin's HOST ssh key (root-only decrypt; what sops-nix uses at activation)
  - &tin_host age1um7zmrhwyfukppwvj079ur2nqjxlmcm94slzjs2jaa5jc3na2pgskqh3vs
  # iodide's user age key on tin (plain age-keygen, ~/.config/sops/age/keys.txt)
  - &iodide_tin age1cek3xedtkdrdqy3tqd8txrjy00xhu4eukl6ct8upusck6mlhlemqdwvlkr
creation_rules:
  - path_regex: secrets/.*\.yaml$
    key_groups:
      - age:
          - *fluoride_carbon
          - *bromide_germanium
          - *tin_host
          - *iodide_tin
