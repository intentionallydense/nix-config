# sops-nix configuration.
# Secrets are encrypted with an age key derived from the SSH ed25519 key.
#
# Setup:
#   1. Derive your age public key:
#      ssh-to-age < ~/.ssh/id_ed25519.pub
#   2. Replace the placeholder below with the output.
#   3. Create the age private key for decryption:
#      mkdir -p ~/.config/sops/age
#      ssh-to-age -private-key -i ~/.ssh/id_ed25519 > ~/.config/sops/age/keys.txt
#   4. Create a secret file:
#      sops secrets/secrets.yaml
keys:
  - &fluoride_carbon age17chsklmd20tfpmc9enx3hws4eed0tkcjy4fq5mcq8w9ggd8kh9lsz254m9
  - &bromide_germanium age15zk95vyfa7wrgqvx6egxc88a66f7tk5m86u864k9le9wgrhxu9ds825x6u
creation_rules:
  - path_regex: secrets/.*\.yaml$
    key_groups:
      - age:
          - *fluoride_carbon
          - *bromide_germanium
